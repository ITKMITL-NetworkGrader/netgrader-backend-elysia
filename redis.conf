# Redis Configuration for NetGrader Backend
# Optimized for stability and connection reliability

# Network and Connection Settings
bind 0.0.0.0
port 6379
timeout 300
tcp-keepalive 60
tcp-backlog 511

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence Settings
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Client Settings
maxclients 10000

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""

# Enable AOF for better durability
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Connection pooling
tcp-keepalive 60
